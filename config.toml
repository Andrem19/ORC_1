[[workers]]
worker_id = "lmstudio-1"
role = "executor"
system_prompt = "Primary direct research executor."

[[workers]]
worker_id = "lmstudio-2"
role = "executor"
system_prompt = "Primary direct research executor."

[[workers]]
worker_id = "lmstudio-3"
role = "executor"
system_prompt = "Primary direct research executor."

[planner_adapter]
name = "claude_planner_cli"
cli_path = "claude"
model = "opus"
extra_flags = []
mode = "batch_json"
use_bare = true
no_session_persistence = true
effort = ""
capture_stderr_live = true

[worker_adapter]
# Direct worker provider. LM Studio uses [direct_execution] MCP tool loop.
name = "lmstudio_worker_api"
base_url = "http://localhost:1234"
api_key = "lm-studio"
temperature = 0.1
max_tokens = 4096

[direct_execution]
# provider values:
# - "minimax": use MiniMax OpenAI-compatible API plus internal dev_space1 MCP tool loop
# - "lmstudio": use LM Studio chat completions plus internal dev_space1 MCP tool loop
# - "qwen_cli": use qwen-code native tool mode
provider = "minimax"
fallback_1 = "claude_cli"
fallback_2 = "off"
timeout_seconds = 1200
max_attempts_per_slice = 2
max_tool_calls_per_slice = 24
max_expensive_tool_calls_per_slice = 6
mcp_endpoint_url = "https://mcp.remart.ovh/mcp/2708b1cec6ab6067f390e6e93c981667f704ddf3ae4190bdf8996d1b3369895d"
mcp_auth_mode = "none"
mcp_token_env_var = "DEV_SPACE1_MCP_BEARER_TOKEN"
connect_timeout_seconds = 10.0
read_timeout_seconds = 60.0
first_action_timeout_seconds = 90
stalled_action_timeout_seconds = 90
retry_budget = 1
incident_on_unclear_contract = true
safe_exclude_tools = ["run_shell_command", "read_file", "write_file", "edit", "grep_search", "glob", "list_directory", "web_fetch", "system_reset_space"]
# Qwen CLI visible_tools probe timeout (s). 30s was flaky on cold MCP handshake;
# 60s lets the probe complete before falling back to tool_use=True.
qwen_preflight_timeout_seconds = 60

[research_config]
baseline_snapshot_id = "active-signal-v1"
baseline_version = 1
symbol = "BTCUSDT"
anchor_timeframe = "1h"
execution_timeframe = "5m"

[notifications]
enabled = true
min_interval_seconds = 30
translate_to_russian = true
# Translation provider: "lmstudio" | "qwen_cli" | "claude_cli" | "off"
translation_provider = "lmstudio"
translation_fallback_1 = "qwen_cli"     # "" to disable
translation_fallback_2 = ""   # "" to disable

# Sequence report narrative generation (LLM enrichment for compiled_raw mode)
[sequence_report]
provider = "claude_cli"
model = "opus"
timeout_seconds = 120
retry_attempts = 2
retry_backoff_seconds = 0.5

# LM Studio — shared connection for worker API and optional translation
[lmstudio]
base_url = "http://localhost:1234"
model = "qwen/qwen3.5-35b-a3b"  # must match model id from /v1/models; empty = use currently loaded
reasoning_effort = "none"   # "none" disables thinking mode for fast responses; "low"/"medium"/"high" enables it

# MiniMax — OpenAI-compatible cloud API for direct execution
[minimax]
base_url = "https://api.minimax.io"
model = "MiniMax-M2.5"
api_key_env_var = "MINIMAX_API"  # reads from .env MINIMAX_API
temperature = 1.0
max_tokens = 8192
