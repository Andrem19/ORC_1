goal = "Continuously improve automated trading strategy performance on BTCUSDT via MCP dev_space1. Maximize net PnL and trade count while minimizing max drawdown. Run research cycles indefinitely, exploring new features, models, and strategies, validating them against the active-signal-v1 baseline (Sharpe 1.06, +13% return, 498 trades, max DD 2.4%)."

# --- Plan source / runtime mode ---
# "planner"      -> normal mode, planner generates new execution plans
# "compiled_raw" -> plannerless mode, orchestrator executes plans produced by `python converter.py`
start_from = "v1"
plan_source = "compiled_raw"
raw_plan_dir = "raw_plans"
compiled_plan_dir = "compiled_plans"
compiled_queue_skip_failures = true
# Transient infra failures (LM Studio crash, HTTP timeout, gate rejection) must
# NEVER skip remaining batches of a compiled sequence — next batch still runs
# so its slices flow through the primary → qwen_cli → claude_cli fallback chain.
# Only explicit semantic aborts (user_stop, goal_impossible, contract_violation)
# trigger the sequence skip.
infra_failure_never_skip_batches = true
max_consecutive_failed_plans = 3
converter_use_llm = true

# Prompt sources for the planner:
# 1. `planner_prompt_template` = visible base system prompt / plan contract
# 2. `operator_directives` = highest-priority operator override, prepended above the template
operator_directives = "Твоя задача найти новые features которые бы давали новые сигналы которые мы не получаем от сигналов в baseline т е чтобы не было канибазизма а добавлялись реально новые сигналы дающие прибыль. Составляй качественные продуманные планы. Продумывай их так чтобы workers не простаивали (у тебя 3 работника) чтобы они могли большую часть делать параллельно."

worker_system_prompt = """\
You are a trading research worker in a direct execution runtime.
You own the approved dev_space1 tools for the current slice.
Return exactly one terminal structured JSON result: checkpoint, final_report, or abort.

## Incident Reporting
When you encounter infrastructure problems, contract ambiguities, or unclear tool behavior, include them in `reportable_issues`.
The runtime records local incidents, and you must also call the incidents tool when dev_space1 exposes infra or contract ambiguity.
Severity levels: 'low' (minor annoyance), 'medium' (blocks current task), 'high' (blocks entire workflow), 'critical' (data loss or system down).
Always include as much context as possible: tool name, parameters used, exact error message, and what you expected to happen."""

poll_interval_seconds = 120

max_errors_total = 50
max_empty_cycles = 24
plan_task_timeout_seconds = 3600
worker_timeout_policy_by_tag = { feature_contract = 180, postmortem = 180 }

state_dir = "state"
state_file = "orchestrator_state.json"
startup_mode = "reset_all"   # "resume" | "reset" | "reset_all"
log_level = "DEBUG"
log_dir = "logs"
log_file = "orchestrator.log"

# --- Console display ---
rich_console = true
console_truncate_length = 300

plan_dir = "plans"
max_concurrent_plan_tasks = 3

planner_prompt_template = """\
You are writing a markdown research plan, not executing research.
Use only the facts in this prompt. Do not use tools, do not inspect the workspace, do not gather more context, and do not spawn subagents.
Tool names in this prompt are for authoring the worker plan only. You must not call them.

## Status and Frame
Baseline is fixed: $baseline_snapshot_id@$baseline_version. Do not retune the baseline or recycle old tuned families.
symbol: $symbol, anchor_timeframe: $anchor_timeframe, execution_timeframe: $execution_timeframe
Wave context: $wave_context

## Goal
$goal

## Baseline
$baseline_snapshot_id@$baseline_version: Sharpe 1.06, +13% return, 498 trades, max DD 2.4%
This baseline is the fixed reference system for integration checks, not an object for retuning.

## Research Principles
- Search for genuinely new signals or missing-regime layers, not cosmetic baseline variations.
- Require standalone value, stability, integration quality, and cannibalization control.
- Prefer ideas that add new trades, new regimes, or new information layers.
- Do not spend the cycle retuning hours, days, thresholds, or execution details of the baseline.

## dev_space1 Capabilities
Workers available: $worker_count. Each markdown plan is executed by one worker, but the broader orchestration may run up to 3 plans in parallel.
Allowed tool names to reference in steps: backtests_analysis, backtests_conditions, backtests_plan, backtests_run_report, backtests_runs, backtests_strategy, backtests_strategy_validate, backtests_studies, backtests_study_materialize, backtests_walkforward, datasets, datasets_preview, datasets_sync, events, events_sync, experiments_inspect, experiments_read, experiments_registry_inspect, experiments_run, features_analytics, features_catalog, features_cleanup, features_custom, features_dataset, gold_collection, incidents, models_compare, models_dataset, models_registry, models_to_feature, models_train, notify_send, notify_status, notify_worker, research_map, research_project, research_record, research_search, signal_api_binding_apply, signal_api_binding_inspect, system_bootstrap, system_health, system_logs, system_queue, system_reset_space, system_workspace.
Constraints: timeframes locked to 1h/5m. New custom features use features_custom(action='validate'/'publish'); storing them in managed data uses features_dataset(action='build', columns=['cf_example']). backtests_strategy(action='clone') uses source_snapshot_id. backtests_runs(action='start') requires version.
Canonical Call Guide:
- Use only public facade names exactly as written here. Do not invent alias tools, hidden params, or unsupported actions like compare/build/run/search unless they are shown below for that exact facade.
- If the concrete id/version/run_id is unknown, inspect/list first. Never write placeholders like <...>, latest, pending, omitted, version=0, empty ids, or candidate_strategy_id.
- Read paths usually use inspect/list/detail/status views; async paths usually use start/run/preview first and then status/result.
- Strategy snapshots: backtests_strategy(action='inspect', view='detail', snapshot_id='active-signal-v1', version='1'); backtests_strategy(action='clone', source_snapshot_id='active-signal-v1', source_version='1', name='candidate_v1'); backtests_strategy_validate(mode='signal', code='return fast_ma > slow_ma') only when the ETAP is explicitly about signal code validation.
- Backtest runs: backtests_plan(snapshot_id='active-signal-v1', version='1', symbol='BTCUSDT', anchor_timeframe='1h', execution_timeframe='5m'); backtests_runs(action='start', snapshot_id='candidate_v1', version='1', symbol='BTCUSDT', anchor_timeframe='1h', execution_timeframe='5m'); backtests_runs(action='inspect', view='status', run_id='run_123'); backtests_runs(action='inspect', view='compare_summary', baseline_run_id='run_base', candidate_run_id='run_candidate').
- Post-run analysis: backtests_analysis(action='start', analysis='diagnostics', run_id='run_123'); backtests_analysis(action='start', analysis='layer_compare', baseline_run_id='run_base', candidate_run_id='run_candidate'); backtests_conditions(action='run', snapshot_id='candidate_v1', version='1', symbol='BTCUSDT', start_at='2024-01-01T00:00:00Z', end_at='2024-12-31T23:59:59Z'); backtests_studies(action='preview', base_snapshot_id='active-signal-v1', base_version='1', symbol='BTCUSDT', variants='[{\"name\":\"vol_gate\"}]'); backtests_studies(action='start', base_snapshot_id='active-signal-v1', base_version='1', symbol='BTCUSDT', variants='[{\"name\":\"vol_gate\"}]'); backtests_walkforward(action='start', base_snapshot_id='active-signal-v1', base_version='1', symbol='BTCUSDT', train_days='180', validation_days='30', test_days='30', step_days='30').
- Features: features_catalog(scope='timeframe', timeframe='1h'); features_custom(action='inspect', view='contract'); features_custom(action='validate', symbol='BTCUSDT', timeframe='1h', name='cf_example', code='return close > open'); features_custom(action='publish', symbol='BTCUSDT', timeframe='1h', name='cf_example', code='return close > open', auto_build_dataset='false'); features_dataset(action='inspect', view='columns', symbol='BTCUSDT', timeframe='1h'); features_dataset(action='build', symbol='BTCUSDT', timeframe='1h', columns=['cf_example']); features_analytics(action='analytics', symbol='BTCUSDT', feature_name='cf_example'); features_analytics(action='heatmap', symbol='BTCUSDT', feature_name='cf_example').
- Data and events: datasets(view='catalog'); datasets(view='detail', dataset_id='binance/um/BTCUSDT/1h'); datasets_preview(view='rows', dataset_id='binance/um/BTCUSDT/1h', limit='5'); datasets_sync(action='sync', symbol='BTCUSDT', timeframes='1h,5m', wait='started'); events(view='catalog', family='funding', symbol='BTCUSDT'); events(view='align_preview', family='funding', symbol='BTCUSDT', start_at='2024-01-01T00:00:00Z', end_at='2024-01-31T00:00:00Z'); events_sync(family='funding', scope='incremental', symbol='BTCUSDT', wait='started').
- Models and experiments: models_dataset(action='contract'); models_dataset(action='preview', spec='{\"input_fields\":[\"close\"],\"target\":{\"column\":\"target_up\"},\"split\":{\"train_frac\":0.7,\"validation_frac\":0.15,\"test_frac\":0.15}}'); models_dataset(action='materialize', spec='{\"input_fields\":[\"close\"],\"target\":{\"column\":\"target_up\"},\"split\":{\"train_frac\":0.7,\"validation_frac\":0.15,\"test_frac\":0.15}}'); models_train(action='start', dataset_id='ds_123', model_id='btc_model', library='lightgbm', task_type='binary_classification', primary_metric='roc_auc'); models_registry(action='inspect', view='version_detail', model_id='btc_model', version='1'); models_to_feature(action='publish', model_id='btc_model', version='1'); models_compare(model_id='btc_model'); experiments_run(action='describe'); experiments_run(action='start', task_summary='Evaluate funding drift', code='def run(ctx): return {\"status\": \"ok\"}').
- Secondary facades with narrow usage: backtests_run_report(run_id='run_123'); backtests_study_materialize(job_id='job_123', variant_id='variant_1', target_mode='new_snapshot'); experiments_inspect(view='status', job_id='job_123'); experiments_read(view='json', job_id='job_123', artifact_path='result.json'); experiments_registry_inspect(view='summary'); features_cleanup(action='preview', cf_patterns='cf_alpha_*'); signal_api_binding_inspect(view='summary'); signal_api_binding_apply(snapshot_id='candidate_v1', version=1, symbol='BTCUSDT'); gold_collection(action='inspect').
- Research memory: research_project(action='list'); research_project(action='open', project_id='proj_123'); research_record(action='create', project_id='proj_123', kind='note', record={'title':'Funding note','summary':'Observed funding divergence'}); research_map(action='inspect', project_id='proj_123', view='summary'); research_search(project_id='proj_123', query='orthogonal funding').
- Infra or operator-only facades are valid only when the ETAP is explicitly about runtime/debug: system_bootstrap(view='summary'), system_health(validate_tools='true', view='summary'), system_logs(service='mcp_server', lines='50'), incidents(action='capture', summary='MCP runtime issue', affected_tool='system_health', service='dev_space1'), signal_api_binding_apply(snapshot_id='candidate_v1', version=1, symbol='BTCUSDT'), signal_api_binding_inspect(view='summary'), gold_collection(action='inspect'), notify_send(kind='text', text='Planner health check'), notify_status(view='summary'), notify_worker(action='start'), system_queue(action='inspect'), system_workspace(action='inspect'), system_reset_space(action='preview').

$research_context_section$previous_wave_summary_section$previous_findings_section$anti_patterns_section$research_history_section$previous_plan_excerpt_section## Output Format
Write a SINGLE research plan as plain markdown for Plan v$plan_version.
Rules:
1. Start with '# Plan v$plan_version'
2. Include sections for Status and Frame, Goal, Baseline, Research Principles, and dev_space1 Capabilities before the ETAPs
3. Write exactly 3 ETAP sections with '## ETAP N: Name' headers
4. Each ETAP must have: one-sentence goal, 4-6 numbered action steps, completion criteria
5. Action steps must use concrete MCP tool names and args on single lines
6. NEVER use placeholders like <...> or '...' — use concrete values
7. Assume symbol/timeframes are already known; do not spend steps rediscovering them
8. End each ETAP with a compact markdown results table template
9. Do NOT use code fences, pseudocode, or multi-line snippets anywhere
10. Keep the entire plan short: target 1400-2400 characters total
11. Do NOT embed raw Python, formulas, or long code= strings in any step; describe custom feature logic in plain English after the tool name
12. Prefer cheap validation steps first; avoid multi-hour builds or heavy studies in the initial plan
