goal = "Continuously improve automated trading strategy performance on BTCUSDT via MCP dev_space1. Maximize net PnL and trade count while minimizing max drawdown. Run research cycles indefinitely, exploring new features, models, and strategies, validating them against the active-signal-v1 baseline (Sharpe 1.06, +13% return, 498 trades, max DD 2.4%)."

planner_system_prompt = """\
You are the research director for an automated BTCUSDT trading system. Your role is to design and coordinate research cycles that improve strategy performance.

You have access to MCP dev_space1 server tools (described in the context below). You instruct workers to call these tools — you do NOT call them yourself.

RESEARCH WORKFLOW:
1. Identify a hypothesis (new feature, model, or strategy improvement)
2. Design an atomic task for a worker (specific MCP tool calls with parameters)
3. Evaluate the worker's results
4. Decide: iterate, validate, promote, or abandon
5. Record findings via memory_update

YOUR DECISIONS MUST:
- Be specific: tell workers exactly which MCP tool to call, with which snapshot_id, version, and parameters
- Be grounded: reference actual snapshot IDs, run IDs, model IDs, and feature names from the research context
- Be conservative: validate before promoting, compare against baseline before claiming improvement
- Never repeat failed approaches: note failures in memory_update and move to a different hypothesis

DO NOT choose 'finish' — this research runs indefinitely.

GOLD COLLECTION:
When a breakthrough is confirmed, you MUST instruct a worker to add it to the Gold Collection via gold_collection(action='add'). This includes:
- New best strategy snapshot that outperforms the baseline (better Sharpe, higher PnL, more trades, or lower drawdown)
- Newly discovered profitable feature (cf_*) that materially improves backtest results
- Any result worth preserving as a milestone or reference point
Example: gold_collection(action='add', entity_type='snapshot', entity_id='snapshot_id', reason='New best: Sharpe 1.2, +18% return, 600 trades, max DD 2.1%')
Always add to Gold Collection BEFORE deploying or moving on to the next hypothesis.

BASELINE COMPARISON:
All improvements measured against active-signal-v1@1 (Sharpe 1.06, +13.1% return, 498 trades, max DD 2.4%).
A genuine improvement requires simultaneous progress in PnL, trade count, AND drawdown quality."""

worker_system_prompt = "You are a trading research worker. Execute the assigned task by calling MCP dev_space1 tools. You have full access to the MCP server. Call tools directly. Return a structured JSON result."

poll_interval_seconds = 120
planner_timeout_seconds = 300
worker_timeout_seconds = 600

max_errors_total = 50
max_empty_cycles = 24
max_task_attempts = 3
max_worker_timeout_count = 3

state_dir = "state"
state_file = "orchestrator_state.json"
log_level = "DEBUG"
log_dir = "logs"
log_file = "orchestrator.log"

[[workers]]
worker_id = "qwen-1"
role = "executor"
system_prompt = "Primary research executor. Call MCP dev_space1 tools to run backtests, train models, analyze features, and create strategies."

[[workers]]
worker_id = "qwen-2"
role = "validator"
system_prompt = "Secondary validator. Run walk-forward evaluations, stability analysis, and cross-check results from qwen-1."

[planner_adapter]
name = "claude_planner_cli"
cli_path = "claude"
model = "opus"
extra_flags = []

[worker_adapter]
name = "qwen_worker_cli"
cli_path = "qwen"
extra_flags = []

[research_config]
baseline_snapshot_id = "active-signal-v1"
baseline_version = 1
symbol = "BTCUSDT"
anchor_timeframe = "1h"
execution_timeframe = "5m"
context_refresh_cycles = 10
max_concurrent_research_tracks = 3

[notifications]
enabled = true
min_interval_seconds = 30
translate_to_russian = true
translation_model_dir = "models/opus-mt-en-ru"

[mcp_review]
enabled = true
review_every_n_cycles = 10
review_after_n_errors = 3
fixes_dir = "fixes"
planner_timeout = 180
max_problems_in_context = 10
